<style>
:root{--bg:#07111f;--card:rgba(255,255,255,.11);--line:rgba(255,255,255,.18);--text:#f8fafc;--muted:#b8c2d2;--shadow:0 24px 80px rgba(0,0,0,.48)}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(109,40,217,.5),transparent 34%),linear-gradient(180deg,#07111f,#020617);min-height:100vh}.wrap{max-width:900px;margin:0 auto;padding:22px 16px 60px}h1{font-size:34px;line-height:1;margin:0 0 8px;letter-spacing:-.045em}p{color:var(--muted);line-height:1.5;margin:0 0 14px}.card{background:var(--card);border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow);backdrop-filter:blur(18px);overflow:hidden}.chooser{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;padding:16px}.choice{border:0;border-radius:24px;padding:18px;font-weight:950;font-size:17px;background:#fff;color:#0f172a;cursor:pointer;text-align:left;box-shadow:0 12px 30px rgba(0,0,0,.22)}.choice.secondary{background:rgba(255,255,255,.12);border:1px solid var(--line);color:#fff}.choice small{display:block;font-size:12px;font-weight:800;margin-top:4px;opacity:.7}#stationMap{height:min(58vh,470px);min-height:310px;background:#0f172a;border-bottom:1px solid var(--line);position:relative}.mapMsg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(80%,360px);text-align:center;color:#fff;font-weight:850;background:rgba(2,6,23,.72);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:14px}.hint{padding:14px 16px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap;color:var(--muted)}.stationIcon{width:24px;height:24px;border-radius:50%;background:#fff;border:5px solid #4f46e5;box-shadow:0 0 0 7px rgba(255,255,255,.22)}.leaflet-popup-content-wrapper{border-radius:18px}.popupBtn{width:100%;padding:12px 14px;border-radius:14px;font-size:14px;margin-top:8px;background:#0f172a;color:#fff;border:0;font-weight:900;cursor:pointer}@media(max-width:640px){h1{font-size:28px}}
</style></head><body><div class="wrap"><h1>Von welchem Bahnhof fährst du los?</h1><p>Wähle deinen Startbahnhof. Danach startet automatisch die passende TrackStories-Reise.</p><div class="card"><div id="stationMap"><div class="mapMsg">Karte wird geladen …<br>Du kannst unten sofort einen Bahnhof wählen.</div></div><div class="chooser"><button class="choice " type="button" data-route-id="voralpen">🚆 St. Gallen HB<small>St. Gallen → Luzern</small></button><button class="choice secondary" type="button" data-route-id="rhb">🚆 Chur Bahnhof<small>Chur → Tirano</small></button><button class="choice secondary" type="button" data-route-id="lecco-milano">🚆 Lecco<small>Lecco-Milano</small></button></div><div class="hint"><span>Die Buttons funktionieren auch ohne Karte.</span><span>🗺️ Leaflet / OpenStreetMap</span></div></div></div>
<script>
let STATIONS=[{"id":"voralpen","name":"St. Gallen HB","route":"St. Gallen → Luzern","lat":47.42391,"lng":9.37037},{"id":"rhb","name":"Chur Bahnhof","route":"Chur → Tirano","lat":46.8531,"lng":9.5297},{"id":"lecco-milano","name":"Lecco","route":"Lecco-Milano","lat":45.853364,"lng":9.396506}];
let LIVE_ROUTES=null;
function decodeB64Utf8(b64){const bin=atob(String(b64||'').trim());const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new TextDecoder('utf-8').decode(bytes)}
function escHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}

function routesFromFirestoreSafe(sourceRoutes){
  const cloned=JSON.parse(JSON.stringify(sourceRoutes||{}));
  Object.keys(cloned).forEach(key=>{
    const liveRoute=cloned[key]?.route?.liveMap?.route;
    if(Array.isArray(liveRoute)){
      cloned[key].route.liveMap.route=liveRoute.map(point=>{
        if(point&&typeof point==='object'&&!Array.isArray(point)&&Number.isFinite(Number(point.lat))&&Number.isFinite(Number(point.lng))) return [Number(point.lat),Number(point.lng)];
        return point;
      });
    }
  });
  return cloned;
}
async function loadLiveRoutesForStart(){
  try{
    const appMod=await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js');
    const fsMod=await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js');
    const firebaseConfig={apiKey:"AIzaSyCPaVcNtu86UM8sb7nLd6c3WdN3sb6Zecs",authDomain:"trackstories-d275b.firebaseapp.com",projectId:"trackstories-d275b",storageBucket:"trackstories-d275b.firebasestorage.app",messagingSenderId:"358291392698",appId:"1:358291392698:web:96c08c6e4f7344ae5dda83",measurementId:"G-BZN10KBY66"};
    const app=appMod.initializeApp(firebaseConfig,'trackstories-start-'+Math.random().toString(36).slice(2));
    const db=fsMod.getFirestore(app);
    const snap=await fsMod.getDoc(fsMod.doc(db,'trackstoriesLive','main'));
    if(!snap.exists()) return;
    const data=snap.data()||{};
    if(!data.routes||typeof data.routes!=='object') return;
    LIVE_ROUTES=routesFromFirestoreSafe(data.routes);
    STATIONS=Object.entries(LIVE_ROUTES).map(([key,val])=>{
      const route=val.route||{};
      const selector=route.stationSelector&&Array.isArray(route.stationSelector.stations)?route.stationSelector.stations[0]:null;
      const start=route.liveMap&&route.liveMap.startStation?route.liveMap.startStation:null;
      const lat=Number((selector&&selector.lat) ?? (start&&start.lat));
      const lng=Number((selector&&selector.lng) ?? (start&&start.lng));
      return {id:key,name:(selector&&selector.label)||(start&&start.name)||route.startBadge||route.title||key,route:route.title||route.introRoute||key,lat,lng};
    }).filter(s=>s.id);
    renderStationButtons();
  }catch(e){
    console.warn('Live-Startdaten konnten nicht geladen werden:',e);
  }
}
function renderStationButtons(){
  const chooser=document.querySelector('.chooser');
  if(!chooser) return;
  chooser.innerHTML=STATIONS.map((s,i)=>'<button class="choice '+(i?'secondary':'')+'" type="button" data-route-id="'+escHtml(s.id)+'">🚆 '+escHtml(s.name)+'<small>'+escHtml(s.route)+'</small></button>').join('');
  bindStationButtons();
}

function buildRouteHtmlFromLiveData(selectedKey){
  const routeData=(LIVE_ROUTES&&LIVE_ROUTES[selectedKey])?LIVE_ROUTES[selectedKey]:null;
  if(!routeData){throw new Error('Online-Daten für diese Strecke konnten nicht geladen werden. Bitte Seite neu laden oder im Admin zuerst „Online speichern“ drücken.');}
  let html=decodeB64Utf8(APP_TEMPLATE_B64);
  html=html.replace(/const SELECTED_ROUTE_KEY = "[^"]*";/,'const SELECTED_ROUTE_KEY = '+JSON.stringify(selectedKey)+';');
  html=html.replace(/const STORAGE_KEY = "[^"]*";/,'const STORAGE_KEY = '+JSON.stringify('trackstories_'+String(selectedKey).replace(/[^a-z0-9_-]/gi,'_')+'_startwahl_v1')+';');
  const injected='const DEFAULT_DATA = '+JSON.stringify(routeData)+';\n    let appData = DEFAULT_DATA;';
  html=html.replace(/const DEFAULT_DATA = [\s\S]*?\n    let appData = DEFAULT_DATA;/, injected);
  return html;
}
function startRoute(which){try{const selectedKey=String(which);const html=buildRouteHtmlFromLiveData(selectedKey);document.open();document.write(html);document.close();}catch(err){alert('Die Reise konnte nicht gestartet werden: '+err.message)}}
window.startRoute=startRoute;
function bindStationButtons(){document.querySelectorAll('[data-route-id]').forEach(btn=>btn.addEventListener('click',()=>startRoute(btn.dataset.routeId)))}
async function initMap(){bindStationButtons();await loadLiveRoutesForStart();const box=document.getElementById('stationMap');const stations=STATIONS.filter(s=>Number.isFinite(Number(s.lat))&&Number.isFinite(Number(s.lng)));try{if(!window.L) throw new Error('Leaflet nicht geladen');if(!stations.length) throw new Error('Keine gültigen Koordinaten');box.innerHTML='';const map=L.map('stationMap',{zoomControl:true,scrollWheelZoom:false});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap contributors'}).addTo(map);const icon=L.divIcon({className:'',html:'<div class="stationIcon"></div>',iconSize:[24,24],iconAnchor:[12,12]});stations.forEach(s=>{const m=L.marker([Number(s.lat),Number(s.lng)],{icon}).addTo(map);m.bindPopup('<b>'+escHtml(s.name)+'</b><br>'+escHtml(s.route)+'<br><button class="popupBtn" onclick="startRoute(&quot;'+s.id+'&quot;)">Hier starten</button>');m.on('click',()=>m.openPopup())});if(stations.length===1){map.setView([Number(stations[0].lat),Number(stations[0].lng)],12)}else{map.fitBounds(stations.map(s=>[Number(s.lat),Number(s.lng)]),{padding:[45,45]})}setTimeout(()=>map.invalidateSize(),250)}catch(e){box.innerHTML='<div class="mapMsg">Karte konnte nicht geladen werden.<br>Bitte Bahnhof unten wählen.</div>'}}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',initMap); else initMap();
</script>
