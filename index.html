<style>

<script>

const TS_DEBUG_T0 = performance.now();
window.TS_DEBUG_LOG_KEY = 'trackstories_debug_log_v1';
function tsDebugEsc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function tsDebugRead(){try{return JSON.parse(localStorage.getItem(window.TS_DEBUG_LOG_KEY)||'[]')}catch(e){return []}}
function tsDebugWrite(items){try{localStorage.setItem(window.TS_DEBUG_LOG_KEY,JSON.stringify(items.slice(-260)))}catch(e){}}
function tsDebug(label, detail){
  const t=Math.round(performance.now()-TS_DEBUG_T0);
  const line='START +'+t+'ms · '+label+(detail?' · '+detail:'');
  const items=tsDebugRead(); items.push(line); tsDebugWrite(items);
  console.log('[TrackStories Debug]', line);
  const body=document.getElementById('tsDebugBody');
  if(body){body.innerHTML=items.map(x=>'<div class="ts-debug-line">'+tsDebugEsc(x)+'</div>').join(''); body.scrollTop=body.scrollHeight;}
}
function tsDebugCopy(){const txt=tsDebugRead().join('\n'); navigator.clipboard?.writeText(txt).then(()=>tsDebug('Debug kopiert')).catch(()=>alert(txt));}
function tsDebugClear(){tsDebugWrite([]); const b=document.getElementById('tsDebugBody'); if(b)b.innerHTML=''; tsDebug('Debug neu gestartet');}
function tsDebugToggle(){const b=document.getElementById('tsDebugBody'); if(b)b.style.display=(b.style.display==='none'?'block':'none');}
window.addEventListener('error',e=>tsDebug('JS-Fehler', (e.message||'')+' @ '+(e.filename||'')+':'+(e.lineno||'')));
window.addEventListener('unhandledrejection',e=>tsDebug('Promise-Fehler', (e.reason&&e.reason.message)||String(e.reason||'')));
setTimeout(()=>{const items=tsDebugRead(); const body=document.getElementById('tsDebugBody'); if(body){body.innerHTML=items.map(x=>'<div class="ts-debug-line">'+tsDebugEsc(x)+'</div>').join(''); body.scrollTop=body.scrollHeight;}},0);
tsDebug('Startseite geladen');

const STATIONS=[{"id":"voralpen","name":"St. Gallen HB","route":"St. Gallen → Luzern","lat":47.42391,"lng":9.37037},{"id":"rhb","name":"Chur Bahnhof","route":"Chur → Tirano","lat":46.8531,"lng":9.5297},{"id":"lecco-milano","name":"Lecco","route":"Lecco-Milano","lat":45.853364,"lng":9.396506}];
function decodeB64Utf8(b64){const bin=atob(String(b64||'').trim());const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new TextDecoder('utf-8').decode(bytes)}
function escHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function startRoute(which){try{tsDebug('Strecke starten angeklickt', String(which));const __tStart=performance.now();const el=document.getElementById('app-'+which+'-b64');if(!el){tsDebug('Start Fehler','App-Block fehlt: '+which);alert('Die Reise-App konnte nicht gefunden werden.');return;}tsDebug('App-Block gefunden', Math.round((el.textContent||'').length/1024)+'KB Base64');const html=decodeB64Utf8(el.textContent);tsDebug('Base64 dekodiert', Math.round(performance.now()-__tStart)+'ms / '+Math.round(html.length/1024)+'KB HTML');document.open();document.write(html);document.close();}catch(err){tsDebug('Start Fehler', err.message||String(err));alert('Die Reise konnte nicht gestartet werden: '+err.message)}}
window.startRoute=startRoute;
function bindStationButtons(){document.querySelectorAll('[data-route-id]').forEach(btn=>btn.addEventListener('click',()=>startRoute(btn.dataset.routeId)))}
function initMap(){tsDebug('initMap Start');bindStationButtons();const box=document.getElementById('stationMap');const stations=STATIONS.filter(s=>Number.isFinite(Number(s.lat))&&Number.isFinite(Number(s.lng)));try{if(!window.L) throw new Error('Leaflet nicht geladen');if(!stations.length) throw new Error('Keine gültigen Koordinaten');box.innerHTML='';const map=L.map('stationMap',{zoomControl:true,scrollWheelZoom:false});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap contributors'}).addTo(map);const icon=L.divIcon({className:'',html:'<div class="stationIcon"></div>',iconSize:[24,24],iconAnchor:[12,12]});stations.forEach(s=>{const m=L.marker([Number(s.lat),Number(s.lng)],{icon}).addTo(map);m.bindPopup('<b>'+escHtml(s.name)+'</b><br>'+escHtml(s.route)+'<br><button class="popupBtn" onclick="startRoute(&quot;'+s.id+'&quot;)">Hier starten</button>');m.on('click',()=>m.openPopup())});if(stations.length===1){map.setView([Number(stations[0].lat),Number(stations[0].lng)],12)}else{map.fitBounds(stations.map(s=>[Number(s.lat),Number(s.lng)]),{padding:[45,45]})}setTimeout(()=>map.invalidateSize(),250);tsDebug('Karte bereit', stations.length+' Marker')}catch(e){tsDebug('Karte Fehler', e.message||String(e));box.innerHTML='<div class="mapMsg">Karte konnte nicht geladen werden.<br>Bitte Bahnhof unten wählen.</div>'}}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',initMap); else initMap();
</script>
