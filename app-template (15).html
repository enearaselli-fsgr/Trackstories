    .channel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.channel-tile{min-height:148px;border:1px solid var(--line);background:var(--card);border-radius:24px;padding:16px;text-align:left;color:white;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between}.channel-tile.active{background:#fff;color:#0f172a;border-color:#fff}.ch-ico{font-size:34px}.ch-name{font-size:19px;font-weight:900;letter-spacing:-.02em}.ch-desc{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.3}.channel-tile.active .ch-desc{color:#475569}.check{font-weight:900;font-size:20px;align-self:flex-end}.audio-card{border:0;background:linear-gradient(135deg,var(--g1),var(--g2));}.audio-box{display:flex;gap:13px;align-items:center;background:rgba(0,0,0,.22);border-radius:18px;padding:14px;margin-bottom:14px}.audio-box .ico{font-size:34px}.audio-title{font-weight:800}.audio-sub{font-size:12px;color:rgba(255,255,255,.72);margin-top:2px}

    .profile-card{background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.08));}.profile-head{display:grid;grid-template-columns:74px 1fr;gap:14px;align-items:center}.avatar{width:74px;height:74px;border-radius:26px;background:linear-gradient(135deg,#fcd34d,#fb7185);display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 12px 28px rgba(0,0,0,.24)}.profile-name{font-size:24px;font-weight:950;letter-spacing:-.04em}.profile-level{font-size:13px;color:var(--muted);margin-top:3px}.alltime{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.statbox{border:1px solid var(--line);background:rgba(255,255,255,.08);border-radius:20px;padding:13px}.statbox .num{font-size:24px;font-weight:950;letter-spacing:-.03em}.statbox .txt{font-size:12px;color:var(--muted);margin-top:3px}.coupon-list{display:grid;gap:9px}.coupon{display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:center;border:1px solid var(--line);background:rgba(255,255,255,.08);border-radius:20px;padding:12px}.coupon .ci{font-size:24px}.coupon .ct{font-weight:900}.coupon .cd{font-size:12px;color:var(--muted);margin-top:2px}.coupon .tag{font-size:11px;background:rgba(255,255,255,.16);border-radius:999px;padding:6px 8px;font-weight:800}

    .start-step{font-size:12px;font-weight:900;color:rgba(255,255,255,.68);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
    .start-choice-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
    .start-summary-box{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.09);border-radius:18px;padding:11px;text-align:left}
    .start-summary-box .k{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.62);font-weight:900}
    .start-summary-box .v{font-size:15px;font-weight:950;margin-top:3px}

    .mirror .silhouette{transform:translate(-50%,-50%) scaleX(-1)}
    .mirror .review-silhouette{transform:translate(-50%,-50%) scaleX(-1)}

    .leaflet-live-map{height:235px;position:relative;border-radius:22px;overflow:hidden;border:1px solid var(--line);margin-top:10px;background:#0f172a}
    .leaflet-live-map .leaflet-control-attribution{font-size:9px;background:rgba(255,255,255,.7)}
    .train-leaflet-icon{width:34px;height:34px;border-radius:50%;background:#fff;color:#0f172a;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 7px rgba(255,255,255,.2);font-size:18px;line-height:34px}
    .station-leaflet-icon{width:14px;height:14px;border-radius:50%;background:#0f172a;border:3px solid #fff;box-shadow:0 0 0 3px rgba(15,23,42,.25)}
    .leaflet-fallback{height:235px;border-radius:22px;border:1px solid var(--line);background:linear-gradient(145deg,#173b57,#123123 55%,#1f2937);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:850;text-align:center;padding:18px}
  </style>

    function interpolateRoute(points, t){
      if(!points.length) return [0,0];
      if(points.length===1) return points[0];
      const segs=[]; let total=0;
      for(let i=0;i<points.length-1;i++){const a=points[i],b=points[i+1]; const d=Math.hypot(b[0]-a[0], b[1]-a[1]); segs.push(d); total+=d;}
      let target=Math.max(0,Math.min(1,t))*total;
      for(let i=0;i<segs.length;i++){if(target<=segs[i]||i===segs.length-1){const a=points[i],b=points[i+1]; const f=segs[i]?target/segs[i]:0; return [a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f];} target-=segs[i];}
      return points[points.length-1];
    }

      if(leafletAnimFrame) cancelAnimationFrame(leafletAnimFrame);

      L.tileLayer(cfg.tileUrl,{maxZoom:19,attribution:cfg.attribution}).addTo(leafletMapInstance);

      if(!trainAnimationStart && introDone) trainAnimationStart=Date.now();
      const initialProgress=introDone?Math.min(1,(Date.now()-(trainAnimationStart||Date.now()))/cfg.animationDurationMs):0;

    function mapCard(){const side=seatSide||"right";const isChallengePhase=(step==="start"||step==="audio");const timerActive=!!challengeTimer||challengeTimerDone;const posText=(isChallengePhase&&!timerActive)?(route().positions?.intro||"Intro läuft"):(isChallengePhase&&!challengeReady)?(route().positions?.moving||route().waitingLabel||"Unterwegs"):(isChallengePhase&&challengeReady)?(route().positions?.ready||route().readyLabel||"Challenge bereit"):(route().positions?.near||"Unterwegs");return `<section class="card"><div class="card-inner"><div class="route-title">🗺️ Live-Karte</div><div id="leafletLiveMap" class="leaflet-live-map" data-side="${side}"></div><div class="next-box"><div class="mini"><div class="k">Position</div><div class="v">${posText}</div></div><div class="mini"><div class="k">Sichtseite</div><div class="v">${sideLabel()}</div></div></div></div></section>`}
    function seatSelector(){return `<section class="card seat-card"><div class="card-inner"><div class="route-title">🪟 Wo sitzt du?</div><p>Wähle deine Sichtseite. Danach werden Karte, Audio-Hinweise und Foto-Challenges auf deine Fensterseite ausgerichtet.</p><div class="seat-options"><button class="seat-btn ${seatSide==='left'?'active':''}" onclick="chooseSeat('left')"><div class="seat-icon">⬅️</div>Links</button><button class="seat-btn ${seatSide==='right'?'active':''}" onclick="chooseSeat('right')"><div class="seat-icon">➡️</div>Rechts</button></div>${seatSide?`<div class="seat-hint">${sideHint()}</div>`:''}</div></section>`}
    function journeyHTML(){let x=c(activeAudioChannelId||channelId); let common=routeCard()+senderCompact(); if(step==='start')return common+(challengeReady?`<button class="btn primary" onclick="openCamera()">📷 Foto-Challenge starten</button>`:`<section class="card"><div class="card-inner"><div class="route-title">⏳ Nächste Challenge</div><p>${(!challengeTimer&&!challengeTimerDone)?'Das Intro-Audio läuft. Danach startet der 20-Sekunden-Timer bis zur ersten Foto-Challenge.':'Die Reise läuft. In etwa 20 Sekunden erscheint automatisch die nächste Foto-Challenge.'}</p></div></section>`)+mapCard(); if(step==='audio')return common+(isSpeaking?waveHTML():(challengeReady?`<button class="btn primary" onclick="openCamera()">📷 Foto-Challenge starten</button>`:`<section class="card"><div class="card-inner"><div class="route-title">⏳ Nächste Challenge</div><p>Die Foto-Challenge wird freigeschaltet, sobald das Sender-Audio fertig ist und der Zug kurz vor dem Zürichsee ist.</p></div></section>`))+`<section class="card audio-card"><div class="card-inner"><div class="route-title">📻 Live-Radio</div><div class="audio-box"><div class="ico">🎧</div><div><div class="audio-title">${x.audioTitle}</div><div class="audio-sub">${isSpeaking?'Audio wird abgespielt':(challengeReady?'Audio fertig · Challenge bereit · Blick nach '+sideLabel():'Audio fertig · Challenge folgt gleich')}</div></div></div><p>${sideAdjusted(x.audioText)}</p></div></section>`+mapCard(); if(step==='photo')return common+`<button class="btn primary" onclick="openCamera()">📷 Kamera öffnen</button>`+mapCard(); if(step==='review')return common+reviewHTML(x)+mapCard(); if(step==='quiz')return common+quizHTML(x)+mapCard(); return common+rewardHTML()+mapCard();}
    function waveHTML(){return `<div class="wave-card" aria-label="Audio läuft"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><div class="wave-label">Audio läuft…</div></div>`}
    function fullCameraHTML(){let x=c();return `<div class="fullcam"><div class="fullcam-view ${seatSide==='left'?'mirror':''}"><div class="cam-top"><div class="cam-pill">📷 Foto-Challenge · ${x.name} · Blick ${sideLabel()}</div><button class="cam-close" onclick="closeCamera()">Schliessen</button></div><div class="silhouette">${silhouetteSVG(x.silhouette)}</div><div class="lake"></div><div class="task">${sideAdjusted(x.photoTask)}<br><span style="opacity:.75;font-size:12px">Tipp: Handy nah an die Scheibe halten, Spiegelungen vermeiden.</span></div><div class="shutter-wrap"><button class="shutter" onclick="takePhoto()" aria-label="Foto aufnehmen"></button></div></div></div>`}
    function silhouetteSVG(type){
      const shapes={
        dragon:`<svg viewBox="0 0 280 180" aria-label="Drachen-Silhouette"><path class="fill" d="M40 118 C62 78 93 66 126 91 C139 62 175 52 203 74 L235 48 L223 88 C246 94 258 111 263 132 C238 121 216 119 196 126 C166 137 139 137 107 127 C82 119 59 121 40 118 Z"/><path d="M126 91 C115 61 91 47 65 43 L82 74"/><path d="M196 126 C211 143 231 151 253 151"/><circle cx="206" cy="78" r="2"/></svg>`,
        factory:`<svg viewBox="0 0 280 180" aria-label="Fabrik-Silhouette"><path class="fill" d="M42 130 V92 L83 112 V88 L125 112 V77 L166 106 V58 H207 V130 Z"/><rect x="181" y="41" width="34" height="89"/><line x1="58" y1="130" x2="58" y2="115"/><line x1="86" y1="130" x2="86" y2="117"/><line x1="116" y1="130" x2="116" y2="117"/><line x1="148" y1="130" x2="148" y2="117"/><path d="M190 31 C178 19 199 12 188 1"/><path d="M209 31 C199 17 222 13 211 0"/></svg>`,
        mountains:`<svg viewBox="0 0 280 180" aria-label="Berg-Silhouette"><path class="fill" d="M23 132 L77 63 L108 101 L145 44 L214 132 Z"/><path d="M77 63 L89 96 L108 101"/><path d="M145 44 L156 86 L179 78 L214 132"/><path d="M28 143 H252"/><circle cx="225" cy="42" r="15"/></svg>`,
        sign:`<svg viewBox="0 0 280 180" aria-label="Schild-Silhouette"><rect class="fill" x="54" y="49" width="172" height="70" rx="14"/><line x1="140" y1="119" x2="140" y2="154"/><line x1="105" y1="154" x2="175" y2="154"/><path d="M82 84 H198"/><path d="M98 103 H182"/><circle cx="74" cy="67" r="4"/><circle cx="206" cy="67" r="4"/></svg>`
      };
      return shapes[type] || shapes.sign;
    }

    function reviewHTML(x){const f=filterClass(x.id);return `<section class="card review-card"><div class="card-inner"><div class="route-title">🖼️ Foto-Review</div><div class="photo-review ${seatSide==='left'?'mirror':''}"><div class="review-silhouette">${silhouetteSVG(x.silhouette)}</div><div class="review-overlay ${f}"></div><div class="review-label"><div class="t">${reviewTitle(x.id)}</div><div class="d">Dein Bild wurde veredelt. In der echten App wäre hier dein aufgenommenes Foto mit passendem Kanal-Filter sichtbar.</div></div></div><button class="btn primary" style="margin-top:14px" onclick="go('quiz')">Weiter zum Quiz</button><button class="btn secondary" onclick="openCamera()">Foto nochmals aufnehmen</button></div></section>`}
    function filterClass(id){return id==='myths'?'mist':id==='business'?'gold':id==='nature'?'clear':'commuter'}
    function reviewTitle(id){return id==='myths'?'Sagen-Filter: leichter Nebel':id==='business'?'Wirtschafts-Filter: warmer Stadtglanz':id==='nature'?'Natur-Filter: klares Panorama':'Pendler-Filter: Morgenfenster'}
    function channelsHTML(){return `<h2 class="section-title">Senderwahl</h2><section class="channel-grid">${channels.map(x=>`<button class="channel-tile ${x.id===channelId?'active':''}" onclick="selectChannel('${x.id}')"><div><div class="ch-ico">${x.icon}</div><div class="ch-name">${x.name}</div><div class="ch-desc">${x.desc}</div></div><div class="check">${x.id===channelId?'✓':''}</div></button>`).join('')}</section><button class="btn primary" style="margin-top:14px" onclick="setTab('journey')">Zur aktuellen Reise</button>`}
    function leaderboardData(){return [{name:'Mara',pts:720},{name:'Theo',pts:610},{name:'Du',pts:xp,me:true},{name:'Lina',pts:390},{name:'Noah',pts:320}].sort((a,b)=>b.pts-a.pts)}
    function currentRank(){return leaderboardData().findIndex(r=>r.me)+1}
    function rankedBoard(){return leaderboardData().map((r,i)=>`<div class="rank ${r.me?'me':''}"><div class="pos">${i+1}</div><div class="name">${r.name}</div><div class="pts">${r.pts} XP</div></div>`).join('')}
    function scoreHTML(){const rank=currentRank();const scoreNote=scoreAnimating?'Punkte werden gutgeschrieben …':(unlockedPoints>0?`+${unlockedPoints} XP freigeschaltet · Die Punkte werden jetzt angerechnet.`:`Rang ${rank} im heutigen Zug · Foto + richtige Antwort = +180 XP${lastPoints?` · zuletzt +${lastPoints} XP`:''}`);return `<h2 class="section-title">Rangliste / Score</h2><section class="card"><div class="card-inner"><div class="label">Aktueller Score</div><div class="score-big">${xp}</div><div class="score-sub">${scoreNote}</div></div></section><section class="card"><div class="card-inner"><div class="route-title">🏆 Rangliste</div><div class="board">${rankedBoard()}</div></div></section><section class="card"><div class="card-inner"><div class="route-title">⚡ Tagesziel</div><p>Noch 2 gelöste Quizfragen bis zum Titel „Voralpen-Entdecker:in“. Kombiniere Foto-Challenge und Quiz, um direkt in der Rangliste aufzusteigen.</p></div></section>`}
    function cleanText(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
    function allCoupons(){
      const configured=Array.isArray(appData.coupons)?appData.coupons:[];
      if(configured.length) return configured;
      return [
        {icon:'☕',title:'10% See-Kaffee',description:'Confiserie in Luzern · freigeschaltet durch Rapperswil-Quiz',tag:'aktiv'},
        {icon:'🥐',title:'Pendler-Gipfeli',description:'Partner-Bäckerei am Bahnhof · einmalig einlösbar',tag:'aktiv'},
        {icon:'🏛️',title:'Museumseintritt',description:'Bonus nach 5 Kultur-Challenges',tag:'neu'}
      ];
    }
    function collectedRewards(){
      const defs=Array.isArray(appData.rewards)?appData.rewards:[];
      const seen=new Set();
      const result=[];
      (Array.isArray(album)?album:[]).forEach(item=>{
        const key=String(item??'').trim();
        if(!key) return;
        const def=defs.find(r=>String(r.id)===key||String(r.title)===key)||{};
        const id=def.id||key;
        if(seen.has(id)) return;
        seen.add(id);
        result.push({id,title:def.title||key,icon:def.icon||'🏆',description:def.description||''});
      });
      return result;
    }
    function rewardSlotHTML(r,empty=false){
      if(empty) return `<div class="reward-slot empty"><div class="ico">＋</div><div><div class="t">Leerer Reward-Slot</div><div class="d">Noch nicht gesammelt</div></div></div>`;
      return `<div class="reward-slot"><div class="ico">${cleanText(r.icon||'🏆')}</div><div><div class="t">${cleanText(r.title||'Reward')}</div>${r.description?`<div class="d">${cleanText(r.description)}</div>`:''}</div></div>`;
    }
    function rewardsProfileSection(){
      const rewards=collectedRewards();
      const firstFour=rewards.slice(0,4);
      while(firstFour.length<4) firstFour.push(null);
      const preview=firstFour.map(r=>r?rewardSlotHTML(r):rewardSlotHTML(null,true)).join('');
      const all=rewards.length?rewards.map(r=>rewardSlotHTML(r)).join(''):preview;
      return `<details class="card fold-card"><summary class="card-inner"><div><div class="fold-title">🏆 Gesammelte Rewards</div><div class="fold-sub">${rewards.length} einmalige Rewards gesammelt · zuerst 4 Slots sichtbar</div></div></summary><div class="card-inner" style="padding-top:0"><div class="reward-slots fold-preview">${preview}</div><div class="reward-slots fold-extra">${all}</div></div></details>`;
    }
    function statsProfileSection(){
      const rewardCount=collectedRewards().length;
      const couponCount=allCoupons().length;
      return `<section class="card"><div class="card-inner"><div class="route-title">📊 Statistik</div><div class="statgrid"><div class="statbox"><div class="num">${km}</div><div class="txt">gefahrene km</div></div><div class="statbox"><div class="num">${photos}</div><div class="txt">geschossene Bilder</div></div><div class="statbox"><div class="num">${trips}</div><div class="txt">aktive Reisen</div></div><div class="statbox"><div class="num">${rewardCount}</div><div class="txt">gesammelte Sticker</div></div><div class="statbox"><div class="num">${couponCount}</div><div class="txt">Gutscheine</div></div><div class="statbox"><div class="num">${xp}</div><div class="txt">aktueller Score</div></div></div></div></section>`;
    }
    function couponsProfileSection(){
      const coupons=allCoupons();
      const couponItems=coupons.map(c=>`<div class="coupon"><div class="ci">${cleanText(c.icon||'🎟️')}</div><div><div class="ct">${cleanText(c.title||'Gutschein')}</div><div class="cd">${cleanText(c.description||'')}</div></div><div class="tag">${cleanText(c.tag||'aktiv')}</div></div>`).join('') || '<p class="score-sub">Noch keine Gutscheine gesammelt.</p>';
      return `<details class="card fold-card"><summary class="card-inner"><div><div class="fold-title">🎟️ Meine Gutscheine</div><div class="fold-sub">${coupons.length} Gutschein${coupons.length===1?'':'e'} · zum Anzeigen aufklappen</div></div></summary><div class="card-inner" style="padding-top:0"><div class="coupon-list collapsed">${couponItems}</div></div></details>`;
    }
    function profileHTML(){return `<h2 class="section-title">Profil</h2><section class="card profile-card"><div class="card-inner"><div class="profile-head"><div class="avatar">🙂</div><div><div class="label">Reiseprofil</div><div class="profile-name">Pascal</div><div class="profile-level">Voralpen-Entdecker · Level 7</div></div></div><div class="alltime"><div class="statbox"><div class="num">${alltime}</div><div class="txt">Alltime Score</div></div><div class="statbox"><div class="num">${vouchers}</div><div class="txt">Aktive Gutscheine</div></div></div></div></section>${rewardsProfileSection()}${statsProfileSection()}${couponsProfileSection()}`}
        function quizHTML(x){const q=x.quiz, answered=selectedAnswer!==null||quizTimedOut, ok=selectedAnswer===q.correct;return `<section class="card quiz-card"><div class="card-inner"><div class="quiz-head"><span class="pill">Audio-Match</span><span class="timer">⏱️ ${quizTimeLeft} Sek.</span></div><div class="question">${sideAdjusted(q.question)}</div><div class="seat-hint">Diese Frage ist für deine Sichtseite (${sideLabel()}) ausgerichtet.</div>${q.answers.map(a=>{let cls='answer',mark=''; if(answered&&a===q.correct){cls+=' correct';mark='✓'} if(answered&&a===selectedAnswer&&a!==q.correct){cls+=' wrong';mark='✕'} return `<button class="${cls}" ${answered?'disabled':''} onclick="answer('${esc(a)}')"><span>${a}</span><span>${mark}</span></button>`}).join('')}${answered?`<div class="feedback ${ok?'good':'bad'}"><strong>${ok?'Richtig!':(quizTimedOut?'Zeit abgelaufen.':'Fast.')}</strong><br>${ok?q.fact:(quizTimedOut?'Die 30 Sekunden sind vorbei. Die richtige Antwort wäre: '+q.correct+'.':'Die richtige Antwort wäre: '+q.correct+'.')}</div>`:''}</div></section><button class="btn primary" ${answered?'':'disabled'} onclick="go('reward')">Belohnung ansehen</button>`}
    
    function activeReward(){
      const ch=c();
      const q=(ch&&ch.quiz)||{};
      const wanted=q.rewardId||q.id||ch.id;
      const rewards=Array.isArray(appData.rewards)?appData.rewards:[];
      return rewards.find(r=>r.id===wanted)||rewards.find(r=>r.id===ch.id)||null;
    }
    function rewardHTML(){
      const earned=lastPoints||0;
      const r=activeReward()||{};
      const title=r.title||c().name||'Reward';
      const icon=r.icon||'🏆';
      const desc=r.description||'Deine Belohnung wurde durch die richtige Quizantwort freigeschaltet.';
      return `<section class="card reward"><div class="card-inner"><h2>🎁 Belohnung freigeschaltet</h2><div class="reward-box"><div class="k">Digitaler Sticker</div><div class="v">${icon} „${title}“</div><div class="d">${desc}</div></div><div class="reward-box"><div class="k">Punkte freigeschaltet</div><div class="v">+${earned} XP</div><div class="d">Die Punkte werden erst angerechnet, wenn du den Menüpunkt „Score“ öffnest. Dort kannst du zusehen, wie dein Score steigt und du in der Rangliste nach oben kletterst.</div></div></div></section><div class="grid2"><button class="btn secondary" onclick="continueRide()">Weiterfahren</button><button class="btn" onclick="restart()">Neustart</button></div>`;
    }
    function selectChannel(id){clearQuizTimer();if(id===channelId){tab='journey';cameraOpen=false;render();return}channelId=id;setTheme();selectedAnswer=null;tab='journey';cameraOpen=false;pendingPoints=0;quizTimedOut=false;if(introDone){if(!isSpeaking){audioFinished=false;challengeReady=false;challengeTimerDone=false;clearChallengeTimer();scheduleChallengeButton();startAudio()}else{render()}}else{step='start';render()}} function chooseSeat(side){seatSide=side;render()} function claimReward(){
      clearQuizTimer();
      if(pendingPoints>0){
        lastPoints=pendingPoints;
        unlockedPoints+=pendingPoints;
        pendingPoints=0;
        photoReadyForScore=false;
        const r=activeReward();
        const title=(r&&r.title)||c().name||'Reward';
        if(!album.includes(title)) album.push(title);
      }
    } function startScoreClaimAnimation(){if(unlockedPoints<=0||scoreAnimating)return;scoreAnimating=true;const total=unlockedPoints;const target=xp+total;const stepSize=Math.max(5,Math.ceil(total/24));const tick=()=>{if(tab!=='score'){scoreAnimating=false;return}const add=Math.min(stepSize,target-xp);xp+=add;alltime+=add;unlockedPoints=Math.max(0,target-xp);render();if(xp<target){scoreAnimTimer=setTimeout(tick,85)}else{unlockedPoints=0;scoreAnimating=false;lastPoints=total;render()}};scoreAnimTimer=setTimeout(tick,350)} function go(s){if(s==='reward')claimReward();step=s;if(s==='quiz'){startQuizTimer();render()}else if(s==='audio')startAudio();else{clearQuizTimer();render()}} function openCamera(){clearQuizTimer();clearChallengeTimer();challengeReady=false;step='photo';cameraOpen=true;render()} function closeCamera(){cameraOpen=false;render()} function takePhoto(){playCameraClick();cameraOpen=false;step='review';selectedAnswer=null;pendingPoints=0;photoReadyForScore=true;photos+=1;render()} function answer(a){if(selectedAnswer!==null||quizTimedOut)return;clearQuizTimer();selectedAnswer=a;if(a===c().quiz.correct){successFeedback();pendingPoints=photoReadyForScore?180:80}else{pendingPoints=0;lastPoints=0}render()} function continueRide(){clearQuizTimer();step='start';selectedAnswer=null;quizTimedOut=false;pendingPoints=0;challengeReady=false;challengeTimerDone=false;render();scheduleChallengeButton()} function restart(){clearQuizTimer();clearChallengeTimer();if(senderAudioDelayTimer){clearTimeout(senderAudioDelayTimer);senderAudioDelayTimer=null}step='start';selectedAnswer=null;quizTimedOut=false;xp=450;vouchers=2;album=['Schlossgeist'];cameraOpen=false;audioFinished=false;photoReadyForScore=false;pendingPoints=0;unlockedPoints=0;lastPoints=0;scoreAnimating=false;challengeReady=false;challengeTimerDone=false;lastSenderAudioChannel=null;activeAudioChannelId=isSpeaking?activeAudioChannelId:null;render();scheduleChallengeButton()} function startAudio(){clearQuizTimer();if(isSpeaking){step='audio';render();return}step='audio';audioFinished=false;isSpeaking=true;lastSenderAudioChannel=channelId;activeAudioChannelId=channelId;const audioChannelId=channelId;render();const audioChannel=c(audioChannelId);const finishSenderAudio=()=>{if(activeAudioChannelId!==audioChannelId)return;isSpeaking=false;audioFinished=true;activeAudioChannelId=null;if(challengeTimerDone&&!challengeReady){challengeReady=true;playPloppSound()}render()};const text=sideAdjusted(audioChannel.audioText);if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(text);u.lang='de-CH';u.rate=.92;u.pitch=1;u.onend=finishSenderAudio;u.onerror=finishSenderAudio;window.speechSynthesis.speak(u)}else{setTimeout(finishSenderAudio,6500)}} function successFeedback(){if('vibrate' in navigator) navigator.vibrate(50);playSuccessPing()} function playCameraClick(){
      try{
        const audio=document.getElementById('cameraShutterAudio');
        if(!audio) return;
        audio.pause();
        audio.currentTime=0;
        audio.volume=.95;
        const p=audio.play();
        if(p && typeof p.catch==='function') p.catch(()=>{});
      }catch(e){}
    } function playSuccessPing(){try{const C=window.AudioContext||window.webkitAudioContext;const ctx=new C();const now=ctx.currentTime;const gain=ctx.createGain();gain.gain.setValueAtTime(.0001,now);gain.gain.exponentialRampToValueAtTime(.18,now+.02);gain.gain.exponentialRampToValueAtTime(.0001,now+.28);gain.connect(ctx.destination);[660,880].forEach((freq,i)=>{const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(freq,now+i*.08);osc.connect(gain);osc.start(now+i*.08);osc.stop(now+i*.08+.16)});setTimeout(()=>ctx.close(),450)}catch(e){}} function clearChallengeTimer(){if(challengeTimer){clearTimeout(challengeTimer);challengeTimer=null}challengeTimerDone=false} function clearQuizTimer(){if(quizTimer){clearTimeout(quizTimer);quizTimer=null} if(quizTickTimer){clearInterval(quizTickTimer);quizTickTimer=null}} function startQuizTimer(){clearQuizTimer();quizTimeLeft=30;quizTimedOut=false;selectedAnswer=null;pendingPoints=0;quizTickTimer=setInterval(()=>{if(step!=='quiz'){clearQuizTimer();return} quizTimeLeft=Math.max(0,quizTimeLeft-1);playTickSound(); if(quizTimeLeft<=0){clearQuizTimer();quizTimedOut=true;pendingPoints=0;render();return} render()},1000)} function playTickSound(){try{const C=window.AudioContext||window.webkitAudioContext;const ctx=new C();const now=ctx.currentTime;const gain=ctx.createGain();gain.gain.setValueAtTime(.0001,now);gain.gain.exponentialRampToValueAtTime(.055,now+.004);gain.gain.exponentialRampToValueAtTime(.0001,now+.055);gain.connect(ctx.destination);const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(950,now);osc.connect(gain);osc.start(now);osc.stop(now+.06);setTimeout(()=>ctx.close(),120)}catch(e){}} function scheduleChallengeButton(){clearChallengeTimer();if(!introDone) return;challengeReady=false;challengeTimerDone=false;challengeTimer=setTimeout(()=>{challengeTimerDone=true;if(!isSpeaking){challengeReady=true;playPloppSound()}render()},20000)} function playPloppSound(){try{const C=window.AudioContext||window.webkitAudioContext;const ctx=new C();const now=ctx.currentTime;const gain=ctx.createGain();gain.gain.setValueAtTime(.0001,now);gain.gain.exponentialRampToValueAtTime(.22,now+.015);gain.gain.exponentialRampToValueAtTime(.0001,now+.22);gain.connect(ctx.destination);const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(360,now);osc.frequency.exponentialRampToValueAtTime(760,now+.08);osc.frequency.exponentialRampToValueAtTime(420,now+.2);osc.connect(gain);osc.start(now);osc.stop(now+.24);setTimeout(()=>ctx.close(),380)}catch(e){}} function stopAudio(doRender=true){if('speechSynthesis' in window) window.speechSynthesis.cancel();isSpeaking=false;activeAudioChannelId=null;if(doRender)render()} function esc(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;')}
    async function initApp(){
      await loadExternalData();
      loadStoredState();
      // Beim Öffnen der App immer zuerst Sitzseite und Sender wählen lassen.
      // Fortschritt/Score bleibt gespeichert, aber das Start-Onboarding wird bewusst neu angezeigt.
      seatSide = null;
      introChannelChosen = false;
      introDone = false;
      step = 'start';
      applyData(appData);
      render();
    }
    initApp();
  </script>
</body>
</html>
